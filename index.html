<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Document</title>
	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
</head>
<body>
	<div class="col-5 mx-auto text-center">
		<h1>Случайное число от 0 до 100</h1>
		<h2 class="random_number " style="font-size: 100px;">0</h2>
		<button class="btn btn-success">Сгенерировать</button>
	</div>
	<script>
		/*
		1. Создай функцию getRandomNumber, которая будет возвращать рандомное (случайное) число от 0 до 100.
		2. Пропиши клик на кнопку, чтобы когда кликаешь на кнопку, в h2 с классом random_number появлялось рандомное число от 0 до 100.
		*/
		function getRandomNumber() {
			return Math.floor(Math.random() * 101);
		}
		document.querySelector('.btn').addEventListener('click', function() {
			document.querySelector('.random_number').textContent = getRandomNumber();
		});
		
	</script>
</body>
</html>
